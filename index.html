<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSM Timeline Generator — The Compton</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #12121c;
      --card: #16161f;
      --border: rgba(255,255,255,0.06);
      --text: #e0e0e0;
      --muted: #666;
      --accent: #00d9ff;
      --accent2: #00d98f;
      --purple: #b366ff;
      --orange: #ffaa00;
      --danger: #ef4444;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    /* Light Mode */
    body.light-mode {
      --bg: #f5f6fa;
      --card: #ffffff;
      --border: #e1e4e8;
      --text: #2d3436;
      --muted: #636e72;
    }
    
    /* Header */
    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    
    .brand {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    
    .theme-toggle-track {
      width: 36px;
      height: 20px;
      background: #2d3436;
      border-radius: 10px;
      position: relative;
      transition: background 0.3s;
    }
    
    .theme-toggle-thumb {
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.3s;
    }
    
    body.light-mode .theme-toggle-track { background: #0984e3; }
    body.light-mode .theme-toggle-thumb { transform: translateX(16px); }
    
    .theme-toggle-label {
      font-size: 0.75rem;
      color: var(--muted);
    }
    
    /* Main Content */
    .main-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    
    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .page-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    
    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .card-header {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05rem;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    
    /* Form */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-group.full {
      grid-column: 1 / -1;
    }
    
    .form-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03rem;
    }
    
    .form-input, .form-select {
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }
    
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    body.light-mode .form-input, body.light-mode .form-select {
      background: #f8f9fa;
    }
    
    /* Buttons */
    .btn {
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--text);
    }
    
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    
    .btn-primary:hover {
      background: #00c4e6;
      border-color: #00c4e6;
      color: #000;
    }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    
    /* Timeline */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .timeline-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }
    
    body.light-mode .timeline-item {
      background: #f8f9fa;
    }
    
    .timeline-item:hover {
      border-color: var(--accent);
    }
    
    .timeline-date {
      min-width: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
    }
    
    .timeline-task {
      flex: 1;
      font-size: 0.9rem;
    }
    
    .timeline-badge {
      font-size: 0.65rem;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.03rem;
    }
    
    .badge-pre { background: rgba(0,217,143,0.15); color: var(--accent2); }
    .badge-post { background: rgba(179,102,255,0.15); color: var(--purple); }
    
    /* Events List */
    .event-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    body.light-mode .event-row {
      background: #f8f9fa;
    }
    
    .event-info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
    }
    
    .event-info p {
      font-size: 0.8rem;
      color: var(--muted);
    }
    
    .event-type-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 6px;
    }
    
    .badge-wedding { background: rgba(255,170,0,0.15); color: var(--orange); }
    .badge-event { background: rgba(0,217,255,0.15); color: var(--accent); }
    
    .event-actions {
      display: flex;
      gap: 8px;
    }
    
    .event-actions .btn {
      padding: 6px 12px;
      font-size: 0.8rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    
    #savedEvents { display: none; }
    #savedEvents.has-events { display: block; }
    
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .timeline-item { flex-direction: column; align-items: flex-start; gap: 8px; }
      .timeline-date { min-width: auto; }
      .top-header { padding: 0 1rem; }
      .main-content { padding: 16px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="top-header">
    <div class="brand">📅 CSM Timeline</div>
    <div class="theme-toggle" onclick="toggleTheme()">
      <span class="theme-toggle-label" id="themeLabel">Dark</span>
      <div class="theme-toggle-track">
        <div class="theme-toggle-thumb"></div>
      </div>
    </div>
  </div>
  
  <div class="main-content">
    <h1 class="page-title">CSM Timeline Generator</h1>
    <p class="page-subtitle">Generate event milestones and sync to your calendar</p>
    
    <!-- Input Form -->
    <div class="card">
      <div class="card-header">📝 New Event</div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">Group / Event Name</label>
          <input type="text" class="form-input" id="groupName" placeholder="Smith Wedding">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Event Date</label>
          <input type="date" class="form-input" id="eventDate">
        </div>
        <div class="form-group">
          <label class="form-label">Event Type</label>
          <select class="form-select" id="eventType">
            <option value="non-wedding">Non-Wedding Event</option>
            <option value="wedding">Wedding</option>
          </select>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateTimeline()">Generate Timeline</button>
      </div>
    </div>
    
    <!-- Timeline Preview -->
    <div class="card" id="timelineCard" style="display: none;">
      <div class="card-header">📋 Timeline Preview</div>
      <div class="timeline" id="timelineList"></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveEvent()">💾 Save Event</button>
        <button class="btn" onclick="downloadICS()">📅 Download .ics</button>
      </div>
    </div>
    
    <!-- Saved Events -->
    <div class="card" id="savedEvents">
      <div class="card-header">📁 Saved Events</div>
      <div id="eventsList"></div>
      <div class="btn-group">
        <button class="btn" onclick="downloadAllICS()">📅 Download All as .ics</button>
      </div>
    </div>
    
    <!-- Subscribe Card -->
    <div class="card">
      <div class="card-header">🔗 Live Calendar Sync</div>
      <p style="color: var(--muted); font-size: 0.85rem; margin-bottom: 16px;">Subscribe once in Outlook and new events will sync automatically!</p>
      <div class="btn-group" style="margin-top: 0;">
        <button class="btn btn-primary" onclick="subscribeToCalendar()">📅 Subscribe in Outlook</button>
        <button class="btn" onclick="copyCalendarLink()">📋 Copy Link</button>
      </div>
      <p id="copyConfirm" style="color: var(--accent2); font-size: 0.8rem; margin-top: 12px; display: none;">✓ Link copied!</p>
    </div>
  </div>
  
  <script>
    // Theme
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      document.getElementById('themeLabel').textContent = isLight ? 'Light' : 'Dark';
      localStorage.setItem('csm_theme', isLight ? 'light' : 'dark');
    }
    
    // Load saved theme
    (function() {
      const savedTheme = localStorage.getItem('csm_theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        setTimeout(() => {
          const label = document.getElementById('themeLabel');
          if (label) label.textContent = 'Light';
        }, 0);
      }
    })();
    
    // Supabase setup
    const SUPABASE_URL = 'https://jwxdolqobyspalaymkyq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3eGRvbHFvYnlzcGFsYXlta3lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzIwOTMsImV4cCI6MjA4ODg0ODA5M30.kagxIB5lhbriS5fcGXzA6fcY5wfK1KRekWP-Fc4BhPU';
    const supabaseClient = (typeof supabase !== 'undefined' && supabase.createClient) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
    
    // Local data
    let events = JSON.parse(localStorage.getItem('csmEvents')) || [];
    let currentTimeline = [];
    
    // Milestone rules (days before event, negative = after)
    const MILESTONES = {
      wedding: [
        { days: 112, task: 'Schedule planning call', minLead: 112 },  // 16 weeks
        { days: 84, task: 'Schedule planning call', minLead: 84, maxLead: 111 },  // 12 weeks (if <16)
        { days: 56, task: 'Tasting', minLead: 56 },  // 8 weeks
        { days: 35, task: 'BEO draft due', minLead: 35 },  // 5 weeks
        { days: 21, task: 'Menu selections due', minLead: 21 },
        { days: 14, task: 'Final guaranteed guest count', minLead: 1 },
        { days: -1, task: 'Send thank you email', minLead: 1 }  // POST event
      ],
      'non-wedding': [
        { days: 84, task: 'Schedule planning call', minLead: 84 },  // 12 weeks
        { days: 35, task: 'BEO draft due', minLead: 35 },  // 5 weeks
        { days: 21, task: 'Menu selections due', minLead: 21 },
        { days: 14, task: 'Final guaranteed guest count', minLead: 1 },
        { days: -1, task: 'Send thank you email', minLead: 1 }  // POST event
      ],
      'short-lead': [
        { days: 14, task: 'Final guest count + confirm menu', minLead: 1 },
        { days: -1, task: 'Send thank you email', minLead: 1 }
      ]
    };
    
    function generateTimeline() {
      const groupName = document.getElementById('groupName').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventType = document.getElementById('eventType').value;
      
      if (!groupName || !eventDate) {
        alert('Please enter group name and event date');
        return;
      }
      
      const eventDateObj = new Date(eventDate + 'T12:00:00');
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const daysOut = Math.floor((eventDateObj - today) / (1000 * 60 * 60 * 24));
      
      // Determine which milestone set to use
      let milestoneSet;
      if (daysOut <= 21) {
        milestoneSet = MILESTONES['short-lead'];
      } else {
        milestoneSet = MILESTONES[eventType];
      }
      
      // Generate timeline
      currentTimeline = [];
      
      milestoneSet.forEach(m => {
        // Check if this milestone applies based on lead time
        if (m.minLead && daysOut < m.minLead) return;
        if (m.maxLead && daysOut > m.maxLead) return;
        
        const milestoneDate = new Date(eventDateObj);
        milestoneDate.setDate(milestoneDate.getDate() - m.days);
        
        // Skip if milestone date is in the past
        if (milestoneDate < today && m.days > 0) return;
        
        currentTimeline.push({
          date: milestoneDate,
          task: m.task,
          isPost: m.days < 0
        });
      });
      
      // Sort by date
      currentTimeline.sort((a, b) => a.date - b.date);
      
      // Render timeline
      renderTimeline();
      document.getElementById('timelineCard').style.display = 'block';
    }
    
    function renderTimeline() {
      const list = document.getElementById('timelineList');
      
      if (currentTimeline.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>No milestones for this timeline</p></div>';
        return;
      }
      
      list.innerHTML = currentTimeline.map(item => `
        <div class="timeline-item">
          <div class="timeline-date">${formatDate(item.date)}</div>
          <div class="timeline-task">${item.task}</div>
          <span class="timeline-badge ${item.isPost ? 'badge-post' : 'badge-pre'}">${item.isPost ? 'Post' : 'Pre'}</span>
        </div>
      `).join('');
    }
    
    function formatDate(date) {
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    
    function saveEvent() {
      const groupName = document.getElementById('groupName').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventType = document.getElementById('eventType').value;
      
      const event = {
        id: Date.now().toString(),
        groupName,
        eventDate,
        eventType,
        timeline: currentTimeline.map(t => ({
          date: t.date.toISOString(),
          task: t.task,
          isPost: t.isPost
        })),
        createdAt: new Date().toISOString()
      };
      
      events.push(event);
      saveData();
      renderEvents();
      
      // Clear form
      document.getElementById('groupName').value = '';
      document.getElementById('eventDate').value = '';
      document.getElementById('timelineCard').style.display = 'none';
      
      alert('Event saved!');
    }
    
    function saveData() {
      localStorage.setItem('csmEvents', JSON.stringify(events));
      syncToCloud();
    }
    
    async function syncToCloud() {
      if (!supabaseClient) return;
      try {
        const { error } = await supabaseClient.from('csm_events').upsert({
          id: 'main',
          data: events,
          updated_at: new Date().toISOString()
        }, { onConflict: 'id' });
        if (error) console.error('Sync error:', error);
        else console.log('Synced to cloud');
      } catch (err) {
        console.error('Sync error:', err);
      }
    }
    
    async function loadFromCloud() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient.from('csm_events').select('*').eq('id', 'main');
        if (error) {
          console.error('Load error:', error);
          return;
        }
        if (data && data.length > 0 && data[0].data) {
          const cloudEvents = data[0].data;
          const localEvents = JSON.parse(localStorage.getItem('csmEvents')) || [];
          if (cloudEvents.length >= localEvents.length) {
            events = cloudEvents;
            localStorage.setItem('csmEvents', JSON.stringify(events));
            console.log('Loaded', events.length, 'events from cloud');
          } else {
            await syncToCloud();
          }
          renderEvents();
        } else {
          await syncToCloud();
        }
      } catch (err) {
        console.error('Load error:', err);
      }
    }
    
    function renderEvents() {
      const container = document.getElementById('eventsList');
      const wrapper = document.getElementById('savedEvents');
      
      if (events.length === 0) {
        wrapper.classList.remove('has-events');
        return;
      }
      
      wrapper.classList.add('has-events');
      container.innerHTML = events.map(e => `
        <div class="event-row">
          <div class="event-info">
            <h3>${e.groupName}</h3>
            <p>
              <span class="event-type-badge ${e.eventType === 'wedding' ? 'badge-wedding' : 'badge-event'}">${e.eventType === 'wedding' ? '💒 Wedding' : '🎉 Event'}</span>
              ${formatDate(new Date(e.eventDate))} · ${e.timeline.length} milestones
            </p>
          </div>
          <div class="event-actions">
            <button class="btn" onclick="downloadEventICS('${e.id}')">📅 .ics</button>
            <button class="btn" onclick="deleteEvent('${e.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }
    
    function deleteEvent(id) {
      if (!confirm('Delete this event?')) return;
      events = events.filter(e => e.id !== id);
      saveData();
      renderEvents();
    }
    
    // ICS Generation
    function generateICSContent(eventList) {
      let ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//The Compton//CSM Timeline//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
X-WR-CALNAME:CSM Deadlines
`;
      
      eventList.forEach(event => {
        event.timeline.forEach(item => {
          const date = new Date(item.date);
          const dateStr = date.toISOString().split('T')[0].replace(/-/g, '');
          const uid = `${event.id}-${dateStr}-${item.task.replace(/\s/g, '')}@compton`;
          
          ics += `BEGIN:VEVENT
DTSTART;VALUE=DATE:${dateStr}
SUMMARY:${event.groupName}: ${item.task}
DESCRIPTION:${event.eventType === 'wedding' ? 'Wedding' : 'Event'} - ${item.task}
UID:${uid}
END:VEVENT
`;
        });
      });
      
      ics += 'END:VCALENDAR';
      return ics;
    }
    
    function downloadICS() {
      const groupName = document.getElementById('groupName').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventType = document.getElementById('eventType').value;
      
      const tempEvent = {
        id: 'temp',
        groupName,
        eventDate,
        eventType,
        timeline: currentTimeline.map(t => ({
          date: t.date.toISOString(),
          task: t.task,
          isPost: t.isPost
        }))
      };
      
      const ics = generateICSContent([tempEvent]);
      downloadFile(ics, `${groupName.replace(/\s/g, '_')}_timeline.ics`);
    }
    
    function downloadEventICS(id) {
      const event = events.find(e => e.id === id);
      if (!event) return;
      
      const ics = generateICSContent([event]);
      downloadFile(ics, `${event.groupName.replace(/\s/g, '_')}_timeline.ics`);
    }
    
    function downloadAllICS() {
      if (events.length === 0) {
        alert('No events to download');
        return;
      }
      
      const ics = generateICSContent(events);
      downloadFile(ics, 'CSM_All_Events.ics');
    }
    
    function downloadFile(content, filename) {
      const blob = new Blob([content], { type: 'text/calendar' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    // Listen for theme changes from parent (if embedded in Kelphi)
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'theme-change') {
        if (event.data.theme === 'light') {
          document.body.classList.add('light-mode');
          document.getElementById('themeLabel').textContent = 'Light';
        } else {
          document.body.classList.remove('light-mode');
          document.getElementById('themeLabel').textContent = 'Dark';
        }
      }
    });
    
    // Calendar subscription
    const CALENDAR_FEED_URL = 'https://jwxdolqobyspalaymkyq.supabase.co/functions/v1/calendar-feed';
    
    function subscribeToCalendar() {
      // webcal:// protocol opens in default calendar app
      const webcalUrl = CALENDAR_FEED_URL.replace('https://', 'webcal://');
      window.open(webcalUrl, '_blank');
    }
    
    function copyCalendarLink() {
      navigator.clipboard.writeText(CALENDAR_FEED_URL).then(() => {
        const confirm = document.getElementById('copyConfirm');
        confirm.style.display = 'block';
        setTimeout(() => confirm.style.display = 'none', 3000);
      });
    }
    
    // Init
    renderEvents();
    loadFromCloud();
  </script>
</body>
</html>
