<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSM Timeline Generator — The Compton</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #a78bfa;
      --accent2: #22c55e;
      --danger: #ef4444;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    
    .header p {
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--accent);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-group.full {
      grid-column: 1 / -1;
    }
    
    .form-group label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .form-group input, .form-group select {
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
    }
    
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #ec4899);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(167, 139, 250, 0.3);
    }
    
    .btn-secondary {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
    }
    
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .timeline-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .timeline-item:hover {
      border-color: var(--accent);
    }
    
    .timeline-date {
      min-width: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
    }
    
    .timeline-task {
      flex: 1;
      font-size: 0.9rem;
    }
    
    .timeline-badge {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: 600;
    }
    
    .badge-pre { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .badge-post { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    
    .empty-state p {
      margin-bottom: 8px;
    }
    
    .events-list {
      margin-top: 16px;
    }
    
    .event-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .event-info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .event-info p {
      font-size: 0.8rem;
      color: var(--muted);
    }
    
    .event-actions {
      display: flex;
      gap: 8px;
    }
    
    .event-actions button {
      padding: 6px 12px;
      font-size: 0.8rem;
    }
    
    #savedEvents { display: none; }
    #savedEvents.has-events { display: block; }
    
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .timeline-item { flex-direction: column; align-items: flex-start; gap: 8px; }
      .timeline-date { min-width: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📅 CSM Timeline Generator</h1>
      <p>Generate event milestones and sync to your calendar</p>
    </div>
    
    <!-- Input Form -->
    <div class="card">
      <h2>📝 New Event</h2>
      <div class="form-row">
        <div class="form-group full">
          <label>Group / Event Name</label>
          <input type="text" id="groupName" placeholder="Smith Wedding">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Event Date</label>
          <input type="date" id="eventDate">
        </div>
        <div class="form-group">
          <label>Event Type</label>
          <select id="eventType">
            <option value="non-wedding">Non-Wedding Event</option>
            <option value="wedding">Wedding</option>
          </select>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateTimeline()">Generate Timeline</button>
      </div>
    </div>
    
    <!-- Timeline Preview -->
    <div class="card" id="timelineCard" style="display: none;">
      <h2>📋 Timeline Preview</h2>
      <div class="timeline" id="timelineList"></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveEvent()">💾 Save Event</button>
        <button class="btn btn-secondary" onclick="downloadICS()">📅 Download .ics</button>
      </div>
    </div>
    
    <!-- Saved Events -->
    <div class="card" id="savedEvents">
      <h2>📁 Saved Events</h2>
      <div class="events-list" id="eventsList"></div>
      <div class="btn-group" style="margin-top: 16px;">
        <button class="btn btn-secondary" onclick="downloadAllICS()">📅 Download All as .ics</button>
      </div>
    </div>
  </div>
  
  <script>
    // Supabase setup
    const SUPABASE_URL = 'https://jwxdolqobyspalaymkyq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3eGRvbHFvYnlzcGFsYXlta3lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzIwOTMsImV4cCI6MjA4ODg0ODA5M30.kagxIB5lhbriS5fcGXzA6fcY5wfK1KRekWP-Fc4BhPU';
    const supabaseClient = (typeof supabase !== 'undefined' && supabase.createClient) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
    
    // Local data
    let events = JSON.parse(localStorage.getItem('csmEvents')) || [];
    let currentTimeline = [];
    
    // Milestone rules (days before event, negative = after)
    const MILESTONES = {
      wedding: [
        { days: 112, task: 'Schedule planning call', minLead: 112 },  // 16 weeks
        { days: 84, task: 'Schedule planning call', minLead: 84, maxLead: 111 },  // 12 weeks (if <16)
        { days: 56, task: 'Tasting', minLead: 56 },  // 8 weeks
        { days: 35, task: 'BEO draft due', minLead: 35 },  // 5 weeks
        { days: 21, task: 'Menu selections due', minLead: 21 },
        { days: 14, task: 'Final guaranteed guest count', minLead: 1 },
        { days: -1, task: 'Send thank you email', minLead: 1 }  // POST event
      ],
      'non-wedding': [
        { days: 84, task: 'Schedule planning call', minLead: 84 },  // 12 weeks
        { days: 35, task: 'BEO draft due', minLead: 35 },  // 5 weeks
        { days: 21, task: 'Menu selections due', minLead: 21 },
        { days: 14, task: 'Final guaranteed guest count', minLead: 1 },
        { days: -1, task: 'Send thank you email', minLead: 1 }  // POST event
      ],
      'short-lead': [
        { days: 14, task: 'Final guest count + confirm menu', minLead: 1 },
        { days: -1, task: 'Send thank you email', minLead: 1 }
      ]
    };
    
    function generateTimeline() {
      const groupName = document.getElementById('groupName').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventType = document.getElementById('eventType').value;
      
      if (!groupName || !eventDate) {
        alert('Please enter group name and event date');
        return;
      }
      
      const eventDateObj = new Date(eventDate + 'T12:00:00');
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const daysOut = Math.floor((eventDateObj - today) / (1000 * 60 * 60 * 24));
      
      // Determine which milestone set to use
      let milestoneSet;
      if (daysOut <= 21) {
        milestoneSet = MILESTONES['short-lead'];
      } else {
        milestoneSet = MILESTONES[eventType];
      }
      
      // Generate timeline
      currentTimeline = [];
      
      milestoneSet.forEach(m => {
        // Check if this milestone applies based on lead time
        if (m.minLead && daysOut < m.minLead) return;
        if (m.maxLead && daysOut > m.maxLead) return;
        
        const milestoneDate = new Date(eventDateObj);
        milestoneDate.setDate(milestoneDate.getDate() - m.days);
        
        // Skip if milestone date is in the past
        if (milestoneDate < today && m.days > 0) return;
        
        currentTimeline.push({
          date: milestoneDate,
          task: m.task,
          isPost: m.days < 0
        });
      });
      
      // Sort by date
      currentTimeline.sort((a, b) => a.date - b.date);
      
      // Render timeline
      renderTimeline();
      document.getElementById('timelineCard').style.display = 'block';
    }
    
    function renderTimeline() {
      const list = document.getElementById('timelineList');
      
      if (currentTimeline.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>No milestones for this timeline</p></div>';
        return;
      }
      
      list.innerHTML = currentTimeline.map(item => `
        <div class="timeline-item">
          <div class="timeline-date">${formatDate(item.date)}</div>
          <div class="timeline-task">${item.task}</div>
          <span class="timeline-badge ${item.isPost ? 'badge-post' : 'badge-pre'}">${item.isPost ? 'Post' : 'Pre'}</span>
        </div>
      `).join('');
    }
    
    function formatDate(date) {
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    
    function saveEvent() {
      const groupName = document.getElementById('groupName').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventType = document.getElementById('eventType').value;
      
      const event = {
        id: Date.now().toString(),
        groupName,
        eventDate,
        eventType,
        timeline: currentTimeline.map(t => ({
          date: t.date.toISOString(),
          task: t.task,
          isPost: t.isPost
        })),
        createdAt: new Date().toISOString()
      };
      
      events.push(event);
      saveData();
      renderEvents();
      
      // Clear form
      document.getElementById('groupName').value = '';
      document.getElementById('eventDate').value = '';
      document.getElementById('timelineCard').style.display = 'none';
      
      alert('Event saved!');
    }
    
    function saveData() {
      localStorage.setItem('csmEvents', JSON.stringify(events));
      syncToCloud();
    }
    
    async function syncToCloud() {
      if (!supabaseClient) return;
      try {
        const { error } = await supabaseClient.from('csm_events').upsert({
          id: 'main',
          data: events,
          updated_at: new Date().toISOString()
        }, { onConflict: 'id' });
        if (error) console.error('Sync error:', error);
        else console.log('Synced to cloud');
      } catch (err) {
        console.error('Sync error:', err);
      }
    }
    
    async function loadFromCloud() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient.from('csm_events').select('*').eq('id', 'main');
        if (error) {
          console.error('Load error:', error);
          return;
        }
        if (data && data.length > 0 && data[0].data) {
          const cloudEvents = data[0].data;
          const localEvents = JSON.parse(localStorage.getItem('csmEvents')) || [];
          if (cloudEvents.length >= localEvents.length) {
            events = cloudEvents;
            localStorage.setItem('csmEvents', JSON.stringify(events));
            console.log('Loaded', events.length, 'events from cloud');
          } else {
            await syncToCloud();
          }
          renderEvents();
        } else {
          await syncToCloud();
        }
      } catch (err) {
        console.error('Load error:', err);
      }
    }
    
    function renderEvents() {
      const container = document.getElementById('eventsList');
      const wrapper = document.getElementById('savedEvents');
      
      if (events.length === 0) {
        wrapper.classList.remove('has-events');
        return;
      }
      
      wrapper.classList.add('has-events');
      container.innerHTML = events.map(e => `
        <div class="event-row">
          <div class="event-info">
            <h3>${e.groupName}</h3>
            <p>${e.eventType === 'wedding' ? '💒 Wedding' : '🎉 Event'} · ${formatDate(new Date(e.eventDate))} · ${e.timeline.length} milestones</p>
          </div>
          <div class="event-actions">
            <button class="btn btn-secondary" onclick="downloadEventICS('${e.id}')">📅 .ics</button>
            <button class="btn btn-secondary" onclick="deleteEvent('${e.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }
    
    function deleteEvent(id) {
      if (!confirm('Delete this event?')) return;
      events = events.filter(e => e.id !== id);
      saveData();
      renderEvents();
    }
    
    // ICS Generation
    function generateICSContent(eventList) {
      let ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//The Compton//CSM Timeline//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
X-WR-CALNAME:CSM Deadlines
`;
      
      eventList.forEach(event => {
        event.timeline.forEach(item => {
          const date = new Date(item.date);
          const dateStr = date.toISOString().split('T')[0].replace(/-/g, '');
          const uid = `${event.id}-${dateStr}-${item.task.replace(/\s/g, '')}@compton`;
          
          ics += `BEGIN:VEVENT
DTSTART;VALUE=DATE:${dateStr}
SUMMARY:${event.groupName}: ${item.task}
DESCRIPTION:${event.eventType === 'wedding' ? 'Wedding' : 'Event'} - ${item.task}
UID:${uid}
END:VEVENT
`;
        });
      });
      
      ics += 'END:VCALENDAR';
      return ics;
    }
    
    function downloadICS() {
      const groupName = document.getElementById('groupName').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventType = document.getElementById('eventType').value;
      
      const tempEvent = {
        id: 'temp',
        groupName,
        eventDate,
        eventType,
        timeline: currentTimeline.map(t => ({
          date: t.date.toISOString(),
          task: t.task,
          isPost: t.isPost
        }))
      };
      
      const ics = generateICSContent([tempEvent]);
      downloadFile(ics, `${groupName.replace(/\s/g, '_')}_timeline.ics`);
    }
    
    function downloadEventICS(id) {
      const event = events.find(e => e.id === id);
      if (!event) return;
      
      const ics = generateICSContent([event]);
      downloadFile(ics, `${event.groupName.replace(/\s/g, '_')}_timeline.ics`);
    }
    
    function downloadAllICS() {
      if (events.length === 0) {
        alert('No events to download');
        return;
      }
      
      const ics = generateICSContent(events);
      downloadFile(ics, 'CSM_All_Events.ics');
    }
    
    function downloadFile(content, filename) {
      const blob = new Blob([content], { type: 'text/calendar' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    // Init
    renderEvents();
    loadFromCloud();
  </script>
</body>
</html>
